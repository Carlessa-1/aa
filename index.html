<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASTANEDA AA2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&family=Noto+Sans+JP:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Slackey&family=ZCOOL+KuaiLe&display=swap"
        rel="stylesheet">
    <style>
body {
  font-family: 'Poppins', sans-serif;;
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

html, body {
  width: 100%;
  height:100%;
}

body {
    background: linear-gradient(-45deg, #ca4545, #e76f3c, #f3d54e, #37e866, #38d7e5, #8662f2);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
}

@keyframes gradient {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}


h1 {
    font-size: 25px;
    margin-bottom: 5px;
    color: white;
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

h2 {
    font-size: 22px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 20px;
    letter-spacing: 2px;
}


.container {
    display: flex;
    flex-direction: column; 
    align-items: center;  
    text-align: center;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}


button {
    margin-top: 20px;
    padding: 12px 28px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #4a90e2, #8662f2);
    color: white;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

button:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    background: linear-gradient(135deg, #5aa0f2, #9a7bff);
}

button:active {
    transform: scale(0.95);
}

        img {
            width: 120%;
            max-width: 300px;
            border-radius: 15px;
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.05);
        }

/* ZOOM EFFECT */
.zoomed {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(2);
    max-width: 90%;
    max-height: 90%;
    z-index: 1000;
    cursor: zoom-out;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* dark background when zoomed */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 999;
}
        
    </style>
</head>


<body>
  <div class="background"></div>

  <div class="container">
    <h1>CASTANEDA, Carlessa Christiana 4Q-AA2</h1>
    <h2>Na10</h2>
  <img id="empty" src="empty.png" alt="empty" onclick="zoomImg()">
    <button onclick="up()">Press me!</button>
  </div>
</body>

<script>
    
    let imgout = document.getElementById("empty");
let zoomed = false;
let overlay;

function up() {
    if (imgout.src.match("empty.png")) {
        imgout.src = "complete.png";
    } else {
        imgout.src = "empty.png";
    }
}

function zoomImg() {
    if (!zoomed) {
        imgout.classList.add("zoomed");

        // create dark background
        overlay = document.createElement("div");
        overlay.classList.add("overlay");
        document.body.appendChild(overlay);

        zoomed = true;
    } else {
        imgout.classList.remove("zoomed");
        document.body.removeChild(overlay);
        zoomed = false;
    }
}
    
</script>

</html>
